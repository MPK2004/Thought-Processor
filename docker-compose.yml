services:
  # ── FastAPI Application ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  # ── Background Ingestion Worker ──────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  # ── Redis (Job Queue + Caching + Chat History) ───────────────────
  redis:
    image: redis:7-alpine
    # No ports exposed — only accessible within the Docker network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  # ── PostgreSQL (Job Tracking) ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    # No ports exposed — only accessible within the Docker network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rag" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

# ── Named Volumes ──────────────────────────────────────────────────
volumes:
  uploads: # Shared between api and worker for PDF file exchange
  pgdata: # Persist PostgreSQL data across restarts
